<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Belka Golf Residence</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Didact+Gothic&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050c06; position: relative; }

    #bg-video {
      position: fixed;
      top: 50%; left: 50%;
      width: 100vw; height: 100vh;
      min-width: 100vw; min-height: 100vh;
      max-width: none;
      object-fit: cover;
      transform: translate(-50%, -50%) scale(1);
      filter: blur(0.8px) brightness(0.75) saturate(0.90);
      z-index: 0;
    }
    /* Mobil için ek koruma */
    @media (max-width: 768px) {
      #bg-video {
        width: 100vw; height: 100vh;
        object-fit: cover;
        object-position: 30% 80%;
      }
    }
    /* iOS Safari address bar fix */
    @supports (-webkit-touch-callout: none) {
      html, body { height: -webkit-fill-available; }
      #bg-video { height: -webkit-fill-available; }
    }

    #overlay {
      position: fixed; inset: 0; z-index: 1;
      background:
        radial-gradient(ellipse at 50% 60%,
          rgba(0,0,0,0.05) 0%,
          rgba(0,0,0,0.55) 100%),
        linear-gradient(to bottom,
          rgba(5,12,6,0.3) 0%,
          rgba(0,0,0,0)    40%,
          rgba(5,12,6,0.5) 100%);
    }

    #content {
      position: fixed; inset: 0; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      gap: 6px;
      padding: 24px;
    }

    /* ── SATIRLAR ── */
    .line {
      opacity: 0;
      transform: translateY(-38px);
      will-change: transform, opacity;
    }

    /* Welcome */
    .line-1 {
      font-family: 'Didact Gothic', sans-serif;
      font-size: clamp(0.75rem, 1.6vw, 1.1rem);
      font-weight: 400;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: rgba(255, 230, 180, 0.72);
      margin-bottom: 8px;
    }

    /* to */
    .line-2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 3vw, 2.6rem);
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.82);
      text-shadow: 0 2px 30px rgba(0,0,0,0.6);
    }

    /* Belka Golf Residence */
    .line-3 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5.5vw, 5.8rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      line-height: 1.05;
      background: linear-gradient(
        135deg,
        #fff8ee  0%,
        #f5dfa0  28%,
        #c8981e  52%,
        #f5dfa0  72%,
        #fff8ee  100%
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 4px 24px rgba(200,152,30,0.35));
      animation-name: shimmer;
      animation-duration: 3.5s;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      animation-play-state: paused;
    }
    .line-3.shimmer-go {
      animation-play-state: running;
    }

    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    /* Altın ince çizgi */
    .gold-sep {
      width: 0; height: 1px; margin-top: 18px;
      background: linear-gradient(90deg,
        transparent 0%, rgba(212,168,90,0.3) 20%,
        #d4a85a 50%,
        rgba(212,168,90,0.3) 80%, transparent 100%);
      opacity: 0;
    }
    .gold-sep.show {
      animation: expandLine 1.2s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    /* Belek · Antalya · Türkiye */
    .sub-line {
      font-family: 'Didact Gothic', sans-serif;
      font-size: clamp(0.55rem, 0.9vw, 0.68rem);
      font-weight: 400;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(255, 230, 180, 0.42);
      margin-top: 12px;
      opacity: 0;
      transform: translateY(-16px);
    }

    /* Göster animasyonları */
    .line.s1 { animation: slideDown 0.9s cubic-bezier(0.22,1,0.36,1) 0s    forwards; }
    .line.s2 { animation: slideDown 0.9s cubic-bezier(0.22,1,0.36,1) 0.18s forwards; }
    .line.s3 { animation: slideDown 1s   cubic-bezier(0.22,1,0.36,1) 0.34s forwards; }
    .sub-line.show { animation: slideDown 0.9s cubic-bezier(0.22,1,0.36,1) 0.7s forwards; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-38px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes expandLine {
      from { width: 0;     opacity: 0; }
      to   { width: 220px; opacity: 1; }
    }

    /* Geçiş */
    #transition {
      position: fixed; inset: 0; z-index: 9999;
      background: #050c06;
      opacity: 0; pointer-events: none;
    }
    #transition.go { animation: fadeBlack 1s ease forwards; }
    @keyframes fadeBlack {
      from { opacity: 0; } to { opacity: 1; }
    }

    @media (max-width: 600px) {
      .line-3 { font-size: clamp(1.8rem, 9vw, 3rem); }
      .line-1 { font-size: 0.65rem; letter-spacing: 0.35em; }
    }
  </style>
</head>
<body>

<div id="transition"></div>

<video id="bg-video" autoplay muted playsinline preload="auto">
  <source src="golf-intro.webm" type="video/webm"/>
</video>

<div id="overlay"></div>

<div id="content">
  <div class="line line-1" id="l1">Welcome</div>
  <div class="line line-2" id="l2">to</div>
  <div class="line line-3" id="l3">Belka Golf Residence</div>
  <div class="gold-sep" id="sep"></div>
  <div class="sub-line" id="sub">Belek &nbsp;·&nbsp; Antalya &nbsp;·&nbsp; Türkiye</div>
</div>

<script>
  const video = document.getElementById('bg-video');
  const trans = document.getElementById('transition');
  let shown   = false;

  function showText() {
    if (shown) return;
    shown = true;
    document.getElementById('l1').classList.add('s1');
    document.getElementById('l2').classList.add('s2');
    document.getElementById('l3').classList.add('s3');
    document.getElementById('l3').classList.add('shimmer-go');
    setTimeout(() => document.getElementById('sep').classList.add('show'), 600);
    setTimeout(() => document.getElementById('sub').classList.add('show'), 800);
  }

  function goToSite() {
    trans.classList.add('go');
    setTimeout(() => { window.location.href = 'main.html'; }, 1000);
  }

  // 3. saniyede yazı çık
  video.addEventListener('timeupdate', () => {
    if (video.currentTime >= 3) showText();
  });

  // Video bitince (6sn) ana sayfaya geç
  video.addEventListener('ended', () => {
    setTimeout(goToSite, 800);
  });

  // Hata durumu
  video.addEventListener('error', () => { showText(); setTimeout(goToSite, 5000); });
  setTimeout(() => {
    if (video.readyState === 0) { showText(); setTimeout(goToSite, 5000); }
  }, 3500);
</script>
</body>
</html>
